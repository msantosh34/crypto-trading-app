version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: crypto_trading_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    command: bundle exec rails s -b 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/crypto_trading_development
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev_secret_key
      RAILS_ENV: development
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  sidekiq:
    build: .
    command: bundle exec sidekiq -c 10 -v
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/crypto_trading_development
      REDIS_URL: redis://redis:6379/1
      RAILS_ENV: development
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
