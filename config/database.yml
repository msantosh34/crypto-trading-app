default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: crypto_trading_development
  host: localhost
  port: 5432

test:
  <<: *default
  database: crypto_trading_test
  host: localhost
  port: 5432

production:
  <<: *default
  database: crypto_trading_production
  username: <%= ENV["DB_USERNAME"] %>
  password: <%= ENV["DB_PASSWORD"] %>
  host: <%= ENV["DB_HOST"] %>
  port: <%= ENV["DB_PORT"] || 5432 %>
