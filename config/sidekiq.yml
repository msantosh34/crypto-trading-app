---
:redis:
  :url: <%= ENV.fetch('REDIS_URL', 'redis://localhost:6379/1') %>
  :timeout: 15

:concurrency: 25
:max_retries: 5
:timeout: 30

:queues:
  - [critical, 8]
  - [default, 5]
  - [low, 1]

:server_middleware:
  - class: Sentry::Sidekiq::ErrorHandler

:client_middleware:
  - class: Sentry::Sidekiq::ClientMiddleware
